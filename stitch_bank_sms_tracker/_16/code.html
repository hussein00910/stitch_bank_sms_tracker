<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "surface-variant": "#e1e3e4",
                        "on-secondary": "#ffffff",
                        "primary": "#006067",
                        "surface-container-highest": "#e1e3e4",
                        "secondary-container": "#d6e5e6",
                        "on-secondary-container": "#596768",
                        "on-error": "#ffffff",
                        "surface": "#f8f9fa",
                        "primary-fixed": "#96f1fa",
                        "outline-variant": "#bdc9ca",
                        "on-tertiary-container": "#ebf4ff",
                        "surface-container-low": "#f3f4f5",
                        "inverse-on-surface": "#f0f1f2",
                        "inverse-primary": "#7ad5dd",
                        "on-primary-container": "#d0fbff",
                        "surface-tint": "#006970",
                        "outline": "#6e797a",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#8ecdff",
                        "on-secondary-fixed": "#101e1f",
                        "inverse-surface": "#2e3132",
                        "primary-fixed-dim": "#7ad5dd",
                        "surface-dim": "#d9dadb",
                        "on-secondary-fixed-variant": "#3c494a",
                        "tertiary": "#005c88",
                        "surface-container-high": "#e7e8e9",
                        "secondary": "#536162",
                        "on-primary-fixed-variant": "#004f54",
                        "on-surface-variant": "#3e494a",
                        "secondary-fixed": "#d6e5e6",
                        "on-tertiary-fixed": "#001e30",
                        "on-background": "#191c1d",
                        "tertiary-fixed": "#cbe6ff",
                        "surface-bright": "#f8f9fa",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#002022",
                        "on-tertiary-fixed-variant": "#004b71",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#bac9ca",
                        "surface-container": "#edeeef",
                        "on-primary": "#ffffff",
                        "background": "#f8f9fa",
                        "tertiary-container": "#2575a6",
                        "primary-container": "#007b83",
                        "on-surface": "#191c1d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, .brand { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f8f9fa]/80 backdrop-blur-xl dark:bg-[#191c1d]/80 flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#006067] dark:text-[#96f1fa]" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-['Manrope'] text-[#006067] dark:text-[#96f1fa] font-extrabold text-xl">The Lucid Ledger</span>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img alt="User Profile" data-alt="a minimalist profile avatar placeholder for a high-end fintech application user" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCKQg42sBswbFT6d5kL5KppqIn8H3NuMXMWPASQ5VyDBQdZPFcal_l_ZDiDxa1uq88Y3sI6mGUfMWMSJkddWOcEXXPzoDdxcfyCUIFL1sCpTj4J3QR_M6LYXb4x-xlKVfaxPhDHTDiHAUg6X855ggo-r2ngawoEEp_MM-4v1svj0_xstSVF2yIwcXNIThMXjHpSffd5ubn7b9cbzBfbpVqqt8vOUgtaiLKjWLuCNNOa654E-dmDJy2lfI_cWNtkqfGn1QOhQyrSGGM"/>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Title & Asymmetric Header -->
<div class="mb-10 flex flex-col items-start gap-2">
<span class="text-xs uppercase tracking-widest text-on-surface-variant font-semibold">المعاملات المالية</span>
<h1 class="text-4xl font-extrabold tracking-tight text-primary leading-tight">إضافة معاملة</h1>
</div>
<!-- Transaction Form Card -->
<div class="bg-surface-container-lowest rounded-[2rem] p-8 shadow-[0_20px_40px_rgba(25,28,29,0.03)] relative overflow-hidden">
<!-- Type Toggle (Income/Expense) -->
<div class="flex p-1 bg-surface-container-low rounded-full mb-10 w-fit mx-auto relative z-10">
<button class="px-8 py-3 rounded-full text-sm font-bold transition-all bg-primary text-on-primary">
                    مصروف
                </button>
<button class="px-8 py-3 rounded-full text-sm font-bold transition-all text-on-secondary-container hover:bg-surface-container-high">
                    دخل
                </button>
</div>
<form class="space-y-8 relative z-10">
<!-- Amount Field (Large Editorial Style) -->
<div class="text-center mb-8">
<label class="block text-xs uppercase tracking-widest text-on-surface-variant font-semibold mb-2">المبلغ</label>
<div class="relative flex items-center justify-center gap-2">
<span class="text-4xl font-extrabold text-primary opacity-50">ر.س</span>
<input class="w-48 text-5xl font-extrabold text-primary bg-transparent border-none focus:ring-0 text-center placeholder:text-surface-variant" dir="ltr" placeholder="0.00" step="0.01" type="number"/>
</div>
<div class="h-0.5 w-32 mx-auto bg-primary-container/20 mt-2"></div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Category Dropdown -->
<div class="group">
<label class="block text-xs uppercase tracking-widest text-on-surface-variant font-semibold mb-3 mr-2">التصنيف</label>
<div class="relative">
<select class="w-full bg-surface-container-highest border-b-2 border-outline focus:border-primary focus:ring-0 rounded-t-md px-4 py-4 appearance-none transition-colors">
<option>تسوق</option>
<option>طعام وشراب</option>
<option>إيجار</option>
<option>ترفيه</option>
<option>صحة</option>
</select>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Date Picker -->
<div class="group">
<label class="block text-xs uppercase tracking-widest text-on-surface-variant font-semibold mb-3 mr-2">التاريخ</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-b-2 border-outline focus:border-primary focus:ring-0 rounded-t-md px-4 py-4 transition-colors" type="date"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="calendar_today">calendar_today</span>
</div>
</div>
</div>
<!-- Notes Field -->
<div class="group">
<label class="block text-xs uppercase tracking-widest text-on-surface-variant font-semibold mb-3 mr-2">ملاحظات</label>
<textarea class="w-full bg-surface-container-highest border-b-2 border-outline focus:border-primary focus:ring-0 rounded-t-md px-4 py-4 resize-none transition-colors" placeholder="أضف وصفاً مختصراً للمعاملة..." rows="3"></textarea>
</div>
<!-- Action Button -->
<button class="w-full py-5 rounded-full bg-gradient-to-r from-primary to-primary-container text-white font-bold text-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="submit">
                    حفظ المعاملة
                    <span class="material-symbols-outlined" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</form>
<!-- Tonal Texture Decoration -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-fixed/20 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-tertiary-fixed/20 rounded-full blur-3xl pointer-events-none"></div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full flex justify-around items-center px-4 pb-8 pt-4 bg-[#ffffff]/80 backdrop-blur-2xl dark:bg-[#1c1c1c]/80 shadow-[0_-10px_40px_rgba(25,28,29,0.03)] z-50 rounded-t-[2rem]">
<div class="flex flex-col items-center justify-center text-[#596768] dark:text-[#bdc9ca] px-5 py-2 hover:bg-[#f3f4f5] dark:hover:bg-[#2e3132] rounded-full transition-colors cursor-pointer">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-semibold mt-1">Vault</span>
</div>
<div class="flex flex-col items-center justify-center text-[#596768] dark:text-[#bdc9ca] px-5 py-2 hover:bg-[#f3f4f5] dark:hover:bg-[#2e3132] rounded-full transition-colors cursor-pointer">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-semibold mt-1">Ledger</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#006067] text-[#ffffff] rounded-[1.25rem] px-5 py-2 dark:bg-[#96f1fa] dark:text-[#00373c] active:scale-90 transition-transform duration-300 ease-out cursor-pointer">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-semibold mt-1">Add</span>
</div>
<div class="flex flex-col items-center justify-center text-[#596768] dark:text-[#bdc9ca] px-5 py-2 hover:bg-[#f3f4f5] dark:hover:bg-[#2e3132] rounded-full transition-colors cursor-pointer">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-semibold mt-1">Profile</span>
</div>
</nav>
</body></html>
